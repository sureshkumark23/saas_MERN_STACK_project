name: MERN CI Pipeline

# 1. TRIGGERS: Runs automatically when you push to main
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ==========================================
  # JOB 1: BACKEND VERIFICATION
  # ==========================================
  backend-ci:
    name: Backend Build & Verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
        
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'
          
      - name: Install Dependencies
        run: npm ci

  # ==========================================
  # JOB 2: FRONTEND LINT, TEST, & BUILD
  # ==========================================
  frontend-ci:
    name: Frontend Code Quality & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
        
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
          
      - name: Install Dependencies
        run: npm ci
        
      # NEW: Code Quality Check! Fails if there are formatting or syntax errors
      - name: Run ESLint
        run: npm run lint

      # NEW: Automated Unit Tests! Fails if any React components are broken
      - name: Run Vitest Unit Tests
        run: npx vitest run # The 'run' command forces it to execute once and exit (prevents it from hanging in watch mode)
        
      # Existing: Strict TypeScript compilation check
      - name: Verify TypeScript Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5000/api